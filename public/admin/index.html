<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whit Cooper — Content Manager</title>

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Fonts — same as main site -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Base ── */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        background: #0a0a0a;
        font-family: 'Atkinson Hyperlegible', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      /* ── CMS text inputs ── */
      input[type="text"], input[type="url"], input[type="email"],
      input[type="search"], input[type="datetime-local"], input[type="date"] {
        background: #1c1c1c !important; color: #f0f0f0 !important;
        border: 1px solid #3a3a3a !important; border-radius: 6px !important;
        font-family: 'Atkinson Hyperlegible', sans-serif !important;
      }
      input[type="text"]:focus, input[type="url"]:focus { border-color: #666 !important; outline: none !important; }
      input[type="text"]::placeholder, input[type="url"]::placeholder { color: #555 !important; }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar            { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track      { background: transparent; }
      ::-webkit-scrollbar-thumb      { background: rgba(255,255,255,0.15); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,0.25); }

      /* ════════════════════════════════════════════════════
         BLOCK EDITOR WIDGET
         ════════════════════════════════════════════════════ */

      .wc-editor {
        font-family: 'Atkinson Hyperlegible', sans-serif;
        color: #e5e5e5;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        overflow: visible;
        min-height: 300px;
      }

      /* ── Format toolbar ── */
      .wc-format-toolbar {
        display: flex; align-items: center; gap: 4px;
        padding: 8px 10px;
        background: rgba(0,0,0,0.5);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        flex-wrap: wrap;
        position: sticky; top: 0; z-index: 20;
        border-radius: 8px 8px 0 0;
      }

      .wc-tb-btn {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        color: #c4c4c4; border-radius: 5px;
        padding: 4px 8px; cursor: pointer;
        font-size: 0.8rem; font-family: inherit;
        transition: background 0.15s, color 0.15s;
        min-height: 28px; line-height: 1;
        white-space: nowrap;
      }
      .wc-tb-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
      .wc-tb-btn:active { background: rgba(255,255,255,0.2); }

      .wc-tb-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.15); margin: 0 3px; flex-shrink: 0; }

      .wc-tb-photo {
        background: rgba(251,191,36,0.12);
        border-color: rgba(251,191,36,0.25);
        color: #fbbf24;
      }
      .wc-tb-photo:hover { background: rgba(251,191,36,0.22); color: #fde68a; }

      /* ── Block list ── */
      .wc-blocks { padding: 12px 14px; min-height: 200px; }

      .wc-block {
        display: flex; align-items: flex-start; gap: 6px;
        margin-bottom: 2px; position: relative;
        border-radius: 6px; padding: 2px 0;
        border-top: 2px solid transparent;
        transition: border-color 0.1s;
      }
      .wc-block:hover .wc-block-handle,
      .wc-block:hover .wc-block-del { opacity: 1; }
      .wc-block.wc-drag-over { border-top-color: #fbbf24; }

      .wc-block-handle {
        opacity: 0; cursor: grab; color: #444; font-size: 1rem;
        padding: 4px 2px; flex-shrink: 0; margin-top: 3px;
        transition: opacity 0.15s; user-select: none;
        line-height: 1;
      }
      .wc-block-handle:active { cursor: grabbing; }

      .wc-block-del {
        opacity: 0; cursor: pointer; color: #555; background: none;
        border: none; font-size: 1rem; padding: 2px 5px; flex-shrink: 0;
        transition: opacity 0.15s, color 0.15s; margin-left: auto;
        line-height: 1; align-self: flex-start; margin-top: 3px;
      }
      .wc-block-del:hover { color: #ef4444; }

      .wc-block-inner { flex: 1; min-width: 0; }

      /* ── Contenteditable text blocks ── */
      .wc-editable {
        outline: none; min-height: 1.6em; line-height: 1.75;
        font-size: 1rem; color: #e5e5e5; word-break: break-word;
        padding: 2px 0;
      }
      .wc-editable:empty::before {
        content: attr(data-placeholder); color: #444; pointer-events: none;
      }
      .wc-editable b, .wc-editable strong { color: #fafafa; }
      .wc-editable a { color: #fbbf24; text-decoration: underline; }

      .wc-heading-editable {
        font-size: 1.5rem; font-weight: 700; color: #fafafa;
        font-family: 'Inter', sans-serif; line-height: 1.3;
      }
      .wc-heading3-editable {
        font-size: 1.2rem; font-weight: 700; color: #fafafa;
        font-family: 'Inter', sans-serif; line-height: 1.3;
      }
      .wc-quote-editable {
        border-left: 4px solid #fbbf24; padding-left: 1rem;
        color: #a1a1aa; font-style: italic; line-height: 1.7;
      }
      .wc-list-editable { padding-left: 1.25rem; }
      .wc-list-editable ul, .wc-list-editable li { margin: 0; }

      /* ── Photo block ── */
      .wc-photo-block {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 10px;
      }
      .wc-photo-block img {
        width: 100%; height: auto; border-radius: 8px;
        display: block; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      }
      .wc-photo-placeholder {
        display: flex; align-items: center; justify-content: center;
        min-height: 110px; background: rgba(255,255,255,0.05);
        border-radius: 8px; color: #555; font-size: 0.85rem;
        cursor: pointer; gap: 8px; border: 1px dashed rgba(255,255,255,0.12);
        transition: background 0.15s, color 0.15s;
      }
      .wc-photo-placeholder:hover { background: rgba(255,255,255,0.09); color: #fbbf24; }

      .wc-photo-controls {
        display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
        margin-top: 8px; padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      .wc-ctrl-label { font-size: 0.68rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
      .wc-ctrl-select {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.13);
        color: #d4d4d8; border-radius: 5px;
        padding: 3px 6px; font-size: 0.75rem; font-family: inherit;
        cursor: pointer;
      }
      .wc-ctrl-select:focus { outline: none; border-color: #555; }

      .wc-change-btn {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
        color: #888; border-radius: 4px; padding: 3px 8px; font-size: 0.72rem;
        cursor: pointer; font-family: inherit; margin-top: 6px; display: block; width: 100%;
        transition: background 0.15s, color 0.15s;
      }
      .wc-change-btn:hover { background: rgba(255,255,255,0.12); color: #ccc; }

      .wc-caption-input {
        width: 100%; margin-top: 6px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        color: #888; border-radius: 5px; padding: 5px 8px;
        font-size: 0.8rem; font-family: inherit; font-style: italic;
      }
      .wc-caption-input::placeholder { color: #444; }
      .wc-caption-input:focus { outline: none; border-color: #444; }

      /* ── Photo row block ── */
      .wc-photo-row-block {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 10px;
      }
      .wc-row-grid { display: grid; gap: 6px; }
      .wc-row-slot {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px; overflow: hidden;
      }
      .wc-row-slot img { width: 100%; display: block; }
      .wc-row-placeholder {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 80px;
        color: #555; font-size: 0.78rem; cursor: pointer; gap: 4px;
        transition: background 0.15s, color 0.15s;
      }
      .wc-row-placeholder:hover { background: rgba(255,255,255,0.05); color: #fbbf24; }
      .wc-slot-caption {
        width: 100%; background: transparent; border: none;
        border-top: 1px solid rgba(255,255,255,0.07);
        color: #777; padding: 4px 6px; font-size: 0.72rem;
        font-style: italic; font-family: inherit;
      }
      .wc-slot-caption::placeholder { color: #3a3a3a; }
      .wc-slot-caption:focus { outline: none; background: rgba(255,255,255,0.03); }

      /* ── Add block ── */
      .wc-add-area { position: relative; padding: 6px 0 6px 28px; margin-top: 4px; }
      .wc-add-btn {
        background: none; border: 1px dashed rgba(255,255,255,0.14);
        color: #555; border-radius: 6px; padding: 5px 14px;
        cursor: pointer; font-size: 0.82rem; font-family: inherit;
        transition: border-color 0.15s, color 0.15s;
      }
      .wc-add-btn:hover { border-color: rgba(255,255,255,0.3); color: #aaa; }

      .wc-block-menu {
        position: absolute; bottom: calc(100% + 4px); left: 0;
        background: #191919; border: 1px solid rgba(255,255,255,0.15);
        border-radius: 10px; padding: 6px; z-index: 100;
        min-width: 175px; box-shadow: 0 12px 36px rgba(0,0,0,0.7);
      }
      .wc-menu-btn {
        display: flex; align-items: center; gap: 9px;
        padding: 7px 10px; border-radius: 6px; cursor: pointer;
        font-size: 0.82rem; color: #b4b4b4; width: 100%;
        background: none; border: none; font-family: inherit; text-align: left;
        transition: background 0.1s, color 0.1s;
      }
      .wc-menu-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
      .wc-menu-icon { font-size: 0.95em; width: 20px; text-align: center; flex-shrink: 0; }
      .wc-menu-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

      /* ── Upload preview overlay ── */
      .wc-upload-overlay {
        position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,0.9);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 24px; gap: 18px;
      }
      .wc-upload-title {
        font-size: 0.78rem; color: #888;
        text-transform: uppercase; letter-spacing: 0.1em;
      }
      .wc-upload-preview-img {
        max-width: min(90vw, 600px); max-height: 55vh;
        border-radius: 12px; object-fit: contain;
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        display: block;
      }
      .wc-rotate-btns { display: flex; gap: 10px; }
      .wc-rotate-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #ccc; border-radius: 7px;
        padding: 8px 18px; font-size: 0.85rem;
        font-family: inherit; cursor: pointer;
        transition: background 0.15s;
      }
      .wc-rotate-btn:hover { background: rgba(255,255,255,0.18); }
      .wc-rotate-btn:disabled { opacity: 0.4; cursor: default; }
      .wc-upload-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .wc-upload-confirm-btn {
        background: rgba(251,191,36,0.15);
        border: 1px solid rgba(251,191,36,0.5);
        color: #fbbf24; border-radius: 8px;
        padding: 10px 28px; font-size: 0.9rem;
        font-family: inherit; cursor: pointer;
        transition: background 0.15s;
      }
      .wc-upload-confirm-btn:hover { background: rgba(251,191,36,0.25); }
      .wc-upload-confirm-btn:disabled { opacity: 0.5; cursor: default; }
      .wc-upload-cancel-btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.15);
        color: #888; border-radius: 8px;
        padding: 10px 20px; font-size: 0.9rem;
        font-family: inherit; cursor: pointer;
      }
      .wc-upload-error {
        color: #ef4444; font-size: 0.82rem;
        text-align: center; max-width: 420px; line-height: 1.5;
      }

      /* mobile: always show handles */
      @media (max-width: 640px) {
        .wc-block-handle, .wc-block-del { opacity: 0.5; }
        .wc-format-toolbar { position: relative; }
      }
    </style>
  </head>

  <body>
    <!-- Hidden file input for photo uploads -->
    <input id="wc-file-input" type="file" accept="image/*" style="display:none">

    <!-- marked.js for parsing existing markdown content on load -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // ════════════════════════════════════════════════════════════════════════
      // CONFIGURATION
      // ════════════════════════════════════════════════════════════════════════
      var REPO         = 'thewcoop/whitcooper-2.0';  // GitHub owner/repo
      var UPLOADS_PATH = 'public/uploads';            // repo-relative upload folder

      // ════════════════════════════════════════════════════════════════════════
      // UTILITIES
      // ════════════════════════════════════════════════════════════════════════
      var _uid = 0;
      function uid() { return 'b' + (++_uid) + '_' + Math.random().toString(36).slice(2, 6); }

      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function slugify(name) {
        return name.replace(/\.[^.]+$/, '').toLowerCase()
          .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'photo';
      }

      // ════════════════════════════════════════════════════════════════════════
      // IMAGE HELPERS  (Canvas API — no external libraries needed)
      // ════════════════════════════════════════════════════════════════════════

      // Resize image file to max MAX_PX on longest side, return canvas
      function compressImage(file, callback) {
        var MAX = 1600;
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else        { w = Math.round(w * MAX / h); h = MAX; }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            callback(canvas, file.name);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Return a new canvas rotated by degrees (90/180/270)
      function getRotatedCanvas(orig, degrees) {
        var d = ((degrees % 360) + 360) % 360;
        if (d === 0) return orig;
        var swap = (d === 90 || d === 270);
        var nw = swap ? orig.height : orig.width;
        var nh = swap ? orig.width  : orig.height;
        var c2 = document.createElement('canvas');
        c2.width = nw; c2.height = nh;
        var ctx = c2.getContext('2d');
        ctx.translate(nw / 2, nh / 2);
        ctx.rotate(d * Math.PI / 180);
        ctx.drawImage(orig, -orig.width / 2, -orig.height / 2);
        return c2;
      }

      // Export canvas as base64 (WebP preferred, JPEG fallback for Safari)
      function canvasToBase64(canvas) {
        var url = canvas.toDataURL('image/webp', 0.85);
        if (!url.startsWith('data:image/webp')) url = canvas.toDataURL('image/jpeg', 0.85);
        return url.split(',')[1];
      }

      function canvasExt(canvas) {
        return canvas.toDataURL('image/webp', 0.85).startsWith('data:image/webp') ? 'webp' : 'jpg';
      }

      // Small JPEG preview src for the rotation UI (no need for full quality)
      function previewSrc(canvas) {
        return canvas.toDataURL('image/jpeg', 0.75);
      }

      // ════════════════════════════════════════════════════════════════════════
      // NETLIFY GIT GATEWAY UPLOAD
      // ════════════════════════════════════════════════════════════════════════
      function uploadViaGitGateway(base64Data, filename) {
        return window.netlifyIdentity.refresh().then(function(token) {
          var url = '/.netlify/git/github/repos/' + REPO + '/contents/' + UPLOADS_PATH + '/' + filename;
          var headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
          var body = JSON.stringify({ message: 'Upload ' + filename + ' via CMS', content: base64Data });

          return fetch(url, { method: 'PUT', headers: headers, body: body }).then(function(resp) {
            // 422 = file already exists → need sha to update
            if (resp.status === 422) {
              return fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(function(r) { return r.json(); })
                .then(function(existing) {
                  var updateBody = JSON.stringify({
                    message: 'Update ' + filename + ' via CMS',
                    content: base64Data,
                    sha: existing.sha,
                  });
                  return fetch(url, { method: 'PUT', headers: headers, body: updateBody });
                });
            }
            return resp;
          }).then(function(resp) {
            if (!resp.ok) return resp.text().then(function(t) { throw new Error('Upload failed (' + resp.status + '): ' + t); });
            return '/uploads/' + filename;
          });
        }).catch(function(err) {
          if (err && err.message && err.message.includes('Upload failed')) throw err;
          throw new Error('Auth error — please refresh and log in again. (' + (err && err.message || err) + ')');
        });
      }

      // ════════════════════════════════════════════════════════════════════════
      // BLOCKS ↔ HTML
      // ════════════════════════════════════════════════════════════════════════
      function blocksToHtml(blocks) {
        return (blocks || []).map(function(b) {
          if (!b) return '';
          if (b.type === 'paragraph') return b.html ? '<p>' + b.html + '</p>' : '';
          if (b.type === 'heading') return '<h' + (b.level || 2) + '>' + (b.html || '') + '</h' + (b.level || 2) + '>';
          if (b.type === 'quote') return '<blockquote>' + (b.html || '') + '</blockquote>';
          if (b.type === 'list') return '<ul>' + (b.html || '') + '</ul>';
          if (b.type === 'photo') {
            var cap = b.caption ? '\n  <figcaption>' + esc(b.caption) + '</figcaption>' : '';
            return '<figure class="cms-photo" data-align="' + esc(b.align || 'center') + '" data-size="' + esc(b.size || 'full') + '" data-aspect="' + esc(b.aspect || 'natural') + '">\n  <img src="' + esc(b.src || '') + '" alt="' + esc(b.alt || b.caption || '') + '" loading="lazy" />' + cap + '\n</figure>';
          }
          if (b.type === 'photo-row') {
            var figs = (b.photos || []).filter(function(p) { return p && p.src; }).map(function(p) {
              var pc = p.caption ? '\n    <figcaption>' + esc(p.caption) + '</figcaption>' : '';
              return '  <figure>\n    <img src="' + esc(p.src) + '" alt="' + esc(p.caption || '') + '" loading="lazy" />' + pc + '\n  </figure>';
            }).join('\n');
            return '<div class="cms-photo-row" data-cols="' + esc(b.cols || '2') + '" data-aspect="' + esc(b.aspect || 'portrait') + '">\n' + figs + '\n</div>';
          }
          return '';
        }).filter(Boolean).join('\n\n');
      }

      function htmlToBlocks(html) {
        if (!html || !html.trim()) return [];
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        var out = [];
        Array.from(tmp.children).forEach(function(el) {
          var t = el.tagName.toLowerCase();
          if (t === 'p') {
            if (el.innerHTML.trim()) out.push({ id: uid(), type: 'paragraph', html: el.innerHTML });
          } else if (/^h[2-6]$/.test(t)) {
            out.push({ id: uid(), type: 'heading', level: t[1], html: el.innerHTML });
          } else if (t === 'blockquote') {
            out.push({ id: uid(), type: 'quote', html: el.innerHTML });
          } else if (t === 'ul' || t === 'ol') {
            out.push({ id: uid(), type: 'list', html: el.innerHTML });
          } else if (t === 'figure' && el.classList.contains('cms-photo')) {
            var img = el.querySelector('img'), fc = el.querySelector('figcaption');
            out.push({
              id: uid(), type: 'photo',
              src:     img ? (img.getAttribute('src') || '') : '',
              alt:     img ? (img.getAttribute('alt') || '') : '',
              caption: fc ? fc.textContent : '',
              align:   el.getAttribute('data-align') || 'center',
              size:    el.getAttribute('data-size') || 'full',
              aspect:  el.getAttribute('data-aspect') || 'natural',
            });
          } else if (t === 'div' && el.classList.contains('cms-photo-row')) {
            var figs = Array.from(el.querySelectorAll(':scope > figure'));
            out.push({
              id: uid(), type: 'photo-row',
              cols:   el.getAttribute('data-cols') || '2',
              aspect: el.getAttribute('data-aspect') || 'portrait',
              photos: figs.map(function(f) {
                var fi = f.querySelector('img'), fc2 = f.querySelector('figcaption');
                return { src: fi ? (fi.getAttribute('src') || '') : '', caption: fc2 ? fc2.textContent : '' };
              }),
            });
          } else if (t !== 'br' && t !== 'hr' && el.textContent.trim()) {
            out.push({ id: uid(), type: 'paragraph', html: el.innerHTML });
          }
        });
        return out;
      }

      function parseContent(raw) {
        if (!raw || !raw.trim()) return [];
        var firstLine = raw.trim().split('\n')[0];
        var looksMarkdown = /^#{1,6}\s/.test(firstLine) ||
          (!/<[a-z]/i.test(firstLine) && /\*\*|\[.+\]\(|!\[/.test(raw));
        var html = looksMarkdown && window.marked ? window.marked.parse(raw) : raw;
        return htmlToBlocks(html);
      }

      // ════════════════════════════════════════════════════════════════════════
      // ContentEditable sub-component

      var CE = createClass({

      // ════════════════════════════════════════════════════════════════════════
      // BLOCK EDITOR CONTROL

      var BlockEditorControl = createClass({

        getInitialState: function() {

            showMenu:       false,
            activeBlock:    null,
            pendingMedia:   null,    // { blockId, slotIndex|null } — waiting for file selection
            pendingPreview: null,    // { blockId, slotIndex, origCanvas, origName, rotation, previewSrc, uploading, error }
            dragBlock:      null,
            dragOver:       null,

        componentDidMount: function() {
          var self = this;

          // ── Attach file input listener (once per page) ──
          var input = document.getElementById('wc-file-input');
          if (input) {
            input.addEventListener('change', function(e) {
              var file = e.target.files && e.target.files[0];
              input.value = '';  // reset so same file can be re-selected
              if (!file || !self.state.pendingMedia) return;
              compressImage(file, function(canvas, origName) {
                var pm = self.state.pendingMedia;
                self.setState({
                  pendingMedia:   null,
                  pendingPreview: {
                    blockId:    pm.blockId,
                    slotIndex:  pm.slotIndex,
                    origCanvas: canvas,
                    origName:   origName || 'photo.jpg',
                    rotation:   0,
                    previewSrc: previewSrc(canvas),
                    uploading:  false,
                    error:      null,

              });
            });
          }

          // ── Parse initial content ──
          var blocks = parseContent(this.props.value || '');
          if (!blocks.length) blocks = [{ id: uid(), type: 'paragraph', html: '' }];
          this.setState({ blocks: blocks });
        },

        componentDidUpdate: function(prevProps, prevState) {

          }
        },

        // ── Block mutations ──
        _upd: function(id, changes) {
          this.setState(function(s) {
            return { blocks: s.blocks.map(function(b) { return b.id === id ? Object.assign({}, b, changes) : b; }) };
          });
        },

        _del: function(id) {
          this.setState(function(s) {
            var bs = s.blocks.filter(function(b) { return b.id !== id; });
            if (!bs.length) bs = [{ id: uid(), type: 'paragraph', html: '' }];
            return { blocks: bs };
          });
        },

        _add: function(type) {
          var self = this;
          var b = { id: uid(), type: type };
          if (type === 'paragraph')  { b.html = ''; }
          if (type === 'heading2')   { b.type = 'heading'; b.level = '2'; b.html = ''; }
          if (type === 'heading3')   { b.type = 'heading'; b.level = '3'; b.html = ''; }
          if (type === 'quote')      { b.html = ''; }
          if (type === 'list')       { b.html = '<li>List item</li>'; }
          if (type === 'photo')      { b.src = ''; b.alt = ''; b.caption = ''; b.align = 'center'; b.size = 'full'; b.aspect = 'natural'; }
          if (type === 'photo-row')  { b.type = 'photo-row'; b.cols = '2'; b.aspect = 'portrait'; b.photos = [{src:'',caption:''},{src:'',caption:''}]; }

          self.setState(function(s) {
            return { blocks: s.blocks.concat([b]), showMenu: false };
          }, function() {
            if (b.type === 'photo') self._openMedia(b.id, null);
          });
        },

        // ── Trigger file picker ──
        _openMedia: function(blockId, slotIndex) {
          this.setState({ pendingMedia: { blockId: blockId, slotIndex: slotIndex }, pendingPreview: null });
          var input = document.getElementById('wc-file-input');
          if (input) input.click();
        },

        // ── Rotate the pending preview ──
        _rotate: function(deg) {
          this.setState(function(s) {
            if (!s.pendingPreview) return {};
            var newRot = ((s.pendingPreview.rotation + deg) % 360 + 360) % 360;
            var rotCanvas = getRotatedCanvas(s.pendingPreview.origCanvas, newRot);
            return {
              pendingPreview: Object.assign({}, s.pendingPreview, {
                rotation:   newRot,
                previewSrc: previewSrc(rotCanvas),
              }),
            };
          });
        },

        // ── Upload the previewed photo ──
        _confirmUpload: function() {
          var self = this;
          var pp = self.state.pendingPreview;
          if (!pp || pp.uploading) return;

          var rotCanvas = getRotatedCanvas(pp.origCanvas, pp.rotation);
          var base64    = canvasToBase64(rotCanvas);
          var ext       = canvasExt(rotCanvas);
          var filename  = slugify(pp.origName) + '-' + Date.now() + '.' + ext;

          self.setState(function(s) {
            return { pendingPreview: Object.assign({}, s.pendingPreview, { uploading: true, error: null }) };
          });

          uploadViaGitGateway(base64, filename).then(function(src) {
            var bid = pp.blockId, si = pp.slotIndex;
            self.setState({ pendingPreview: null });
            if (si != null) {
              var blk = self.state.blocks.find(function(b) { return b.id === bid; });
              if (blk) {
                var photos = (blk.photos || []).slice();
                photos[si] = Object.assign({}, photos[si] || {}, { src: src });
                self._upd(bid, { photos: photos });
              }
            } else {
              self._upd(bid, { src: src });
            }
          }).catch(function(err) {
            self.setState(function(s) {
              return {
                pendingPreview: Object.assign({}, s.pendingPreview, {
                  uploading: false,
                  error: err.message || 'Upload failed. Try again.',
                }),
              };
            });
          });
        },

        // ── Cancel preview ──
        _cancelPreview: function() {
          this.setState({ pendingPreview: null, pendingMedia: null });
        },

        // ── Text formatting ──
        _fmt: function(cmd) {
          return function(e) { e.preventDefault(); document.execCommand(cmd, false, null); };
        },
        _link: function(e) {
          e.preventDefault();
          var sel = window.getSelection();
          if (!sel || sel.isCollapsed) { alert('Select some text first, then click the link button.'); return; }
          var url = window.prompt('Enter URL:', 'https://');
          if (url) document.execCommand('createLink', false, url);
        },
        _setBlockType: function(type, extra) {

          if (type === 'heading') changes.level = extra || '2';
          this._upd(id, changes);
        },

        // ── Keyboard handling ──
        _keyDown: function(e, block) {
          var self = this;
          if (e.key === 'Enter' && !e.shiftKey && block.type !== 'list') {
            e.preventDefault();
            var nb = { id: uid(), type: 'paragraph', html: '' };
            self.setState(function(s) {
              var idx = s.blocks.findIndex(function(b) { return b.id === block.id; });
              var bs  = s.blocks.slice();
              bs.splice(idx + 1, 0, nb);
              return { blocks: bs, activeBlock: nb.id };
            }, function() {
              var el = document.querySelector('[data-bid="' + nb.id + '"] .wc-editable');
              if (el) el.focus();
            });
          }
          if (e.key === 'Backspace' && (!block.html || block.html === '<br>') && block.type === 'paragraph') {
            var idx = self.state.blocks.findIndex(function(b) { return b.id === block.id; });
            if (idx > 0) {
              e.preventDefault();
              var prevId = self.state.blocks[idx - 1].id;
              self._del(block.id);
              setTimeout(function() {
                var el = document.querySelector('[data-bid="' + prevId + '"] .wc-editable');

                  el.focus();

        _dragOver:  function(e, id) { e.preventDefault(); if (id !== this.state.dragBlock) this.setState({ dragOver: id }); },
        _drop:      function(e, toId) {

            var mv  = bs.splice(fi, 1)[0];

      // ════════════════════════════════════════════════════════════════════════
      CMS.registerPreviewStyle('/admin/preview.css');

      // ════════════════════════════════════════════════════════════════════════
      // BLOG POST PREVIEW TEMPLATE (right-side pane)
      // ════════════════════════════════════════════════════════════════════════
      var BlogPreview = createClass({
        render: function() {
          var entry      = this.props.entry;
          var title      = entry.getIn(['data', 'title']);
          var date       = entry.getIn(['data', 'date']);
          var summary    = entry.getIn(['data', 'summary']);
          var coverImage = entry.getIn(['data', 'coverImage']);
          var body       = this.props.widgetFor('body');

          var formattedDate = '';
          if (date) {
            try {
              formattedDate = new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch(e) { formattedDate = String(date); }
          }

          if (!title && !body) {
            return h('div', { className: 'preview-root' },
              h('div', { className: 'preview-empty' }, 'Fill in the fields on the left to see your post preview here.'));
          }

          return h('div', { className: 'preview-root' },
            h('div', { className: 'preview-container' },
              coverImage && h('div', { className: 'cover-wrap' },
                h('img', { src: coverImage, alt: title || 'Cover image', className: 'cover-img' })),
              h('div', { className: 'glass-card post-header' },
                h('h1', { className: 'post-title' }, title || 'Untitled Post'),
                formattedDate && h('div', { className: 'post-meta' },
                  h('span', { className: 'post-date' }, formattedDate)),
                summary && h('p', { className: 'post-summary' }, summary)),
              h('div', { className: 'glass-card post-body' },
                body
                  ? body
                  : h('p', { className: 'body-placeholder' }, 'Write something in the Body field and it will appear here.')),
            ),
          );
        },
      });

      CMS.registerPreviewTemplate('blog', BlogPreview);
    </script>
  </body>
</html>
