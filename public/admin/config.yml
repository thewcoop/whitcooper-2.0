backend:
  name: git-gateway
  branch: main
media_folder: "public/uploads"
public_folder: "/uploads"
collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Body
        name: body
        widget: markdown
        hint: "Write your post here. Use the toolbar above to format text and insert photos inline."
        buttons:
          - bold
          - italic
          - strikethrough
          - link
          - image
          - heading-one
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
      - label: "Photo Grid — Side-by-Side Layouts"
        name: imageGroups
        widget: list
        required: false
        label_singular: "Photo Group"
        collapsed: false
        summary: "{{fields.layout}}"
        hint: >
          Use this section to display photos side by side. Add a group,
          choose a layout (2, 3, or 4 columns), then upload your photos.
          These appear below the body text.
        fields:
          - label: Layout
            name: layout
            widget: select
            default: two-up
            hint: "How many columns to show photos side by side"
            options:
              - { label: "▪  Full Width  (1 large photo)", value: "full" }
              - { label: "▪▪  Side by Side  (2 photos)", value: "two-up" }
              - { label: "▪▪▪  3 Columns  (3 photos)", value: "three-up" }
              - { label: "▪▪▪▪  4 Columns  (4 photos)", value: "four-up" }
          - label: Photos
            name: images
            widget: list
            label_singular: "Photo"
            collapsed: false
            hint: "Click '+ Add Photo' to upload each photo for this group."
            fields:
              - { label: "Photo", name: image, widget: image }
              - { label: "Caption", name: caption, widget: string, required: false, hint: "Short description shown below the photo (optional)" }
              - { label: "Alt Text", name: alt, widget: string, required: false, hint: "Describe the image for screen readers (optional)" }
  - name: portfolio
    label: Portfolio
    folder: src/content/portfolio
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Video URL, name: videoURL, widget: string }
      - { label: Tags, name: tags, widget: select, multiple: true, options: [Editing, "Motion Graphics", VFX, Color, "Sound Design"] }
      - { label: Description, name: description, widget: text }
      - { label: Thumbnail, name: thumbnail, widget: image }
  - name: pages
    label: Pages
    files:
      - file: src/content/pages/about.md
        label: About
        name: about
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
          - { label: Headshot, name: headshot, widget: image }
  - name: "home"
    label: "Home"
    folder: "src/content/home"
    create: false
    slug: "index"
    extension: "json"
    editor: { preview: false }
    fields:
      - { label: "Headline", name: "headline", widget: "string" }
      - { label: "Subline", name: "subline", widget: "text", required: false }
      - { label: "CTA: Portfolio Label", name: "ctaPortfolioLabel", widget: "string", default: "See the spells in action" }
      - { label: "CTA: Portfolio Href", name: "ctaPortfolioHref", widget: "string", default: "/portfolio" }
      - { label: "CTA: Contact Label", name: "ctaContactLabel", widget: "string", default: "Summon me" }
      - { label: "CTA: Contact Href", name: "ctaContactHref", widget: "string", default: "/contact" }
  - name: "skills"
    label: "Skills"
    folder: "src/content/skills"
    create: true
    slug: "{{name | slug}}"
    extension: "json"
    editor: { preview: false }
    summary: "{{name}} - {{pov}}"
    fields:
      - { label: "Name", name: "name", widget: "string", hint: "Enter the skill name (e.g., Editing, Motion Graphics, etc.)" }
      - { label: "POV", name: "pov", widget: "text" }
      - label: "Highlights"
        name: "highlights"
        widget: "list"
        fields: [{ label: "Item", name: "item", widget: "string" }]

  - name: "about"
    label: "About"
    folder: "src/content/about"
    create: false
    slug: "index"
    extension: "json"
    editor: { preview: false }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Headshot", name: "headshot", widget: "image", required: false }
      - { label: "Additional Content", name: "additionalContent", widget: "markdown", required: false }

